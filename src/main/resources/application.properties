spring.application.name=SecurePass Analyzer

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/securepass_analyzer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Destiny}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.error.include-message=never
server.error.include-binding-errors=never

spring.thymeleaf.cache=false
